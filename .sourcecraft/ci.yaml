on:
  push:
    - workflows: build-workflow
      filter:
        branches: ["main"]

workflows:
  build-workflow:
    tasks:
      - build-task

tasks:
  - name: build-task
    cubes:
      - name: build
        image: node:24-alpine
        script:
          - |
            apk add --no-cache chromium
            export CHROME_PATH=/usr/bin/chromium-browser
            npm ci
            npx serve -s . -l 3000 & \
            SERVER_PID=$! && \
            node .sourcecraft/lighthouse-audit.js && \
            kill $SERVER_PID
