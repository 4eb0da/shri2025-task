on:
  push:
    - workflows: build-workflow
      filter:
        branches: ["main"]

workflows:
  build-workflow:
    tasks:
      - build-task

tasks:
  - name: build-task
    cubes:
      - name: build
        image: node:24
        script:
          - |
            set -ex
            node -v
            apt update
            apt install chromium chromium-l10n -y
            export CHROME_PATH=/usr/bin/chromium-browser
            npm ci
            #npx testplane install-deps
            npx playwright install --with-deps
            npx serve -s . -l 3000 & \
            SERVER_PID=$!
            npx playwright test
            echo $?
            node .sourcecraft/lighthouse-audit.ts
            kill $SERVER_PID
        artifacts:
          paths:
            - playwright-report
