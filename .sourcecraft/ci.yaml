on:
  push:
    - workflows: build-workflow
      filter:
        branches: ["main"]

workflows:
  build-workflow:
    tasks:
      - build-task

tasks:
  - name: build-task
    cubes:
      - name: build
        image: node:24
        script:
          - |
            set -ex
            apk add --no-cache chromium# libgles2 gstreamer1.0-libav
            export CHROME_PATH=/usr/bin/chromium-browser
            npm ci
            #npx testplane install-deps
            npx playwright install --with-deps
            npx serve -s . -l 3000 & \
            SERVER_PID=$!
            npx playwright test -u
            node .sourcecraft/lighthouse-audit.ts
            kill $SERVER_PID
        artifacts:
          paths:
            - artifacts/testplane-report
