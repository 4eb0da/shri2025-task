on:
  push:
    - workflows: build-workflow
      filter:
        branches: ["main"]

workflows:
  build-workflow:
    tasks:
      - build-task

tasks:
  - name: build-task
    cubes:
      - name: run-shared-workflow
        image: cr.yandex/sourcecraft/cubes/shared-workflows:latest
        env:
          ORG_SLUG: garret-rus
          REPO_SLUG: shri-task-professor
          WORKFLOW_NAME: build-workflow
          WORKFLOW_VALUES: "[{\"name\": \"STUDENTREPO\", \"value\": \"${SOURCECRAFT_REPO_URL}\"}]"
          TASK_NAME: build-task
          CUBE_NAME: build
          ARTIFACT_LOCAL_PATH: artifacts/professor-output
        artifacts:
          paths:
            - artifacts/output

